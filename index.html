@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Source+Sans+3:wght@400;600&family=JetBrains+Mono:wght@500&display=swap');

:root{
  --paper:#F6F4EE; --card:#FFFFFF; --ink:#1C2B33; --slate:#5E6E78;
  --line:#E4E1D8; --navy:#1E3A4F; --copper:#C2651F; --green:#2F6B54;
}
*{box-sizing:border-box}
.ep-root{display:flex;min-height:100vh;background:var(--paper);color:var(--ink);
  font-family:'Source Sans 3',system-ui,sans-serif;font-size:15px;line-height:1.55}
.ep-loading{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:#F6F4EE;color:#5E6E78;font-family:'JetBrains Mono',monospace;font-size:13px}

/* --- Sidebar --- */
.ep-side{width:248px;flex-shrink:0;background:var(--navy);color:#E9EDEF;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;padding:26px 0 16px}
.ep-brand{padding:0 22px 22px;border-bottom:1px solid rgba(255,255,255,.12)}
.ep-brand-mono{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;color:#9FB3C0}
.ep-brand-name{font-family:'Archivo',sans-serif;font-weight:800;font-size:22px;margin-top:6px}
.ep-brand-sub{font-size:12.5px;color:#9FB3C0;margin-top:2px}
.ep-nav{display:flex;flex-direction:column;padding:14px 10px;gap:2px;flex:1}
.ep-navitem{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border:0;
  background:transparent;color:#C5D1D9;border-radius:8px;cursor:pointer;font:inherit;font-size:14px;text-align:left}
.ep-navitem:hover{background:rgba(255,255,255,.08);color:#fff}
.ep-navitem--on{background:rgba(255,255,255,.12);color:#fff}
.ep-navitem--on .ep-navnum{color:var(--copper)}
.ep-navnum{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#7E94A3;width:18px}
.ep-navlabel{flex:1}
.ep-navchev{opacity:0;transition:opacity .15s}
.ep-navitem--on .ep-navchev{opacity:1}
.ep-savestate{padding:10px 22px 0;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#9FB3C0;min-height:24px}

/* --- Main --- */
.ep-main{flex:1;padding:38px 44px 64px;max-width:1060px;width:100%;margin:0 auto}
.ep-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--copper);margin-bottom:6px}
.ep-h1{font-family:'Archivo',sans-serif;font-weight:800;font-size:34px;margin:0;line-height:1.1}
.ep-h2{font-family:'Archivo',sans-serif;font-weight:700;font-size:26px;margin:0}
.ep-sub{color:var(--slate);margin:8px 0 0;max-width:640px}
.ep-sechead{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:22px;flex-wrap:wrap}

/* --- Hero profil --- */
.ep-hero{display:flex;align-items:center;gap:20px;background:var(--navy);color:#fff;
  border-radius:14px;padding:26px 28px;margin-bottom:18px}
.ep-hero .ep-h1{color:#fff}
.ep-hero-mark{width:64px;height:64px;border-radius:12px;background:var(--copper);color:#fff;
  font-family:'Archivo',sans-serif;font-weight:800;font-size:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ep-hero-title{margin-top:4px;font-size:15px;color:#D7E0E6}
.ep-hero-tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;color:#9FB3C0;margin-top:8px}

/* --- Cards & grids --- */
.ep-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
.ep-cardhead{display:flex;align-items:center;gap:8px;font-family:'Archivo',sans-serif;
  font-weight:700;font-size:15px;margin-bottom:10px;color:var(--navy)}
.ep-grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ep-card p{margin:0;color:#33424B}

/* --- Timeline --- */
.ep-timeline{display:flex;flex-direction:column;gap:14px;margin-top:4px}
.ep-tl-item{display:grid;grid-template-columns:120px 1fr;gap:14px;padding-left:4px;
  border-left:2px solid var(--copper);padding:8px 0 8px 14px}
.ep-tl-period{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--copper);padding-top:2px}
.ep-tl-role{font-weight:600}
.ep-tl-org{font-size:13px;color:var(--slate)}
.ep-tl-desc{margin:4px 0 0;font-size:13.5px;color:#33424B}

/* --- Stars / chips / pills --- */
.ep-stars{display:inline-flex;gap:2px}
.ep-starwrap{position:relative;display:inline-block;line-height:0}
.ep-starhalf{position:absolute;inset:0;width:50%;overflow:hidden;display:inline-block;line-height:0}
.ep-starbtn{background:none;border:0;padding:1px;cursor:pointer;line-height:0;border-radius:4px}
.ep-starbtn--static{cursor:default}
.ep-starbtn:focus-visible{outline:2px solid var(--copper);outline-offset:1px}
.ep-chip{display:inline-block;border:1px solid;border-radius:999px;padding:2px 10px;
  font-size:11.5px;font-weight:600;white-space:nowrap}
.ep-pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 13px;
  font:inherit;font-size:13px;cursor:pointer;color:var(--slate)}
.ep-pill--on{background:var(--navy);border-color:var(--navy);color:#fff}
.ep-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.ep-filterbar{margin-bottom:6px}
.ep-filterbar .ep-filters{margin-bottom:10px}
.ep-filterlabel{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);margin-right:2px}
.ep-proj-detail{border-left:2px solid var(--line);padding-left:12px}
.ep-proj-detail-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--copper);margin-bottom:2px}
.ep-tagwrap{display:flex;gap:6px;flex-wrap:wrap}
.ep-legend{display:flex;gap:14px;flex-wrap:wrap;background:#fff;border:1px dashed var(--line);
  border-radius:10px;padding:10px 14px;margin-bottom:16px}
.ep-legend-item{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600}
.ep-legend-stars{font-size:12px;color:var(--copper);letter-spacing:1px}
.ep-legend-item{align-items:flex-start}
.ep-legend-desc{display:block;font-weight:400;font-size:11px;color:var(--slate)}
.ep-preuve{margin-top:6px}
.ep-preuve-trace{display:inline-flex;align-items:center;gap:6px;color:var(--navy);font-size:13px;font-weight:600}
.ep-preuve-comment{margin:2px 0 0;font-size:12.5px;color:#46565F;font-style:italic}
.ep-conform-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:14px}
.ep-conform-val{font-family:'Archivo',sans-serif;font-weight:800;font-size:22px}
.ep-conform-label{font-size:12px;color:var(--slate)}
.ep-conform-blocs{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px 16px}
.ep-conform-bloc-head{display:flex;justify-content:space-between;font-size:12.5px;font-weight:600;margin-bottom:4px}
.ep-conform-bloc-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate)}
.ep-progress{height:6px;background:var(--line);border-radius:999px;overflow:hidden}
.ep-progress-bar{height:100%;background:var(--copper);border-radius:999px}

/* --- Skills --- */
.ep-skillgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.ep-skill-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.ep-skill-cat{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--slate)}
.ep-skill-name{font-family:'Archivo',sans-serif;font-weight:700;font-size:15.5px;line-height:1.25}
.ep-skill-note{margin:10px 0 0;font-size:13.5px;color:#46565F}
.ep-skill-hist{display:flex;align-items:center;gap:6px;margin-top:10px;
  font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--green)}

/* --- Projets --- */
.ep-projgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px}
.ep-proj{padding:0;overflow:hidden;display:flex;flex-direction:column}
.ep-proj-img{width:100%;height:170px;object-fit:cover;border-bottom:1px solid var(--line)}
.ep-proj-body{padding:16px 18px;display:flex;flex-direction:column;gap:10px}
.ep-proj-title{font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;margin:2px 0 0}
.ep-proj-desc{margin:0;font-size:13.5px;color:#33424B}
.ep-links{display:flex;flex-direction:column;gap:4px}
.ep-link{display:inline-flex;align-items:center;gap:6px;color:var(--navy);font-size:13px;text-decoration:none;border-bottom:1px dotted var(--navy);width:fit-content}
.ep-imgpreview{max-width:240px;border-radius:8px;border:1px solid var(--line);margin-top:8px;display:block}

/* --- KPIs --- */
.ep-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
.ep-kpi{display:flex;flex-direction:column;gap:4px}
.ep-kpi-icon{color:var(--copper)}
.ep-kpi-val{font-family:'Archivo',sans-serif;font-weight:800;font-size:26px}
.ep-kpi-label{font-size:12.5px;color:var(--slate)}

/* --- Forms --- */
.ep-btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;
  color:var(--ink);border-radius:8px;padding:8px 14px;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer}
.ep-btn:hover{border-color:var(--navy)}
.ep-btn--primary{background:var(--navy);border-color:var(--navy);color:#fff}
.ep-btn--primary:hover{background:#16303F}
.ep-btn--ghost{background:transparent}
.ep-btn--danger{border-color:#B4452E;color:#B4452E}
.ep-iconbtn{background:none;border:1px solid transparent;border-radius:6px;padding:5px;
  cursor:pointer;color:var(--slate);line-height:0}
.ep-iconbtn:hover{border-color:var(--line);color:var(--ink)}
.ep-field{display:block;margin-bottom:12px}
.ep-label{display:block;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--slate);margin-bottom:5px}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;
  font:inherit;font-size:14px;background:#fff;color:var(--ink)}
input:focus,textarea:focus,select:focus{outline:2px solid var(--copper);outline-offset:0;border-color:var(--copper)}
.ep-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ep-levelrow{margin-bottom:8px}
.ep-levelrow input{flex:1;min-width:180px}
.ep-subform{border:1px dashed var(--line);border-radius:10px;padding:12px;margin-bottom:10px}
.ep-muted{color:var(--slate);font-size:13px}
.ep-empty{border:1px dashed var(--line);border-radius:10px;padding:22px;text-align:center;color:var(--slate);background:#FCFBF8}

/* --- Modal --- */
.ep-overlay{position:fixed;inset:0;background:rgba(20,32,40,.45);display:flex;align-items:flex-start;
  justify-content:center;padding:6vh 16px;z-index:50;overflow:auto}
.ep-modal{background:#fff;border-radius:14px;width:100%;max-width:520px;box-shadow:0 18px 50px rgba(0,0,0,.22)}
.ep-modal--wide{max-width:680px}
.ep-modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line)}
.ep-modal-head h3{margin:0;font-family:'Archivo',sans-serif;font-size:17px}
.ep-modal-body{padding:18px 20px 20px}
.ep-modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}



/* --- Cartes comp\xE9tence (deux colonnes : Situation / Trace) --- */
.ep-skillgrid--rich{display:flex;flex-direction:column;gap:14px}
.ep-skillc{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card)}
.ep-skillc-head{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:15px 22px}
.ep-skillc-titlewrap{display:flex;align-items:baseline;gap:13px;min-width:0}
.ep-skillc-num{font-family:'Archivo',sans-serif;font-weight:800;font-size:18px;color:#E5A663;
  min-width:24px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.ep-skillc-title{font-family:'Archivo',sans-serif;font-weight:700;font-size:18px;line-height:1.2}
.ep-skillc-eval{display:flex;align-items:center;gap:12px;flex-shrink:0}
.ep-skillc-level{font-size:13px;color:#D7E0E6;white-space:nowrap}
.ep-skillc-actions{display:flex;gap:2px;margin-left:6px}
.ep-iconbtn--light{color:#9FB3C0}
.ep-iconbtn--light:hover{color:#fff;border-color:rgba(255,255,255,.28)}
.ep-skillc-body{display:grid;grid-template-columns:1fr 1fr}
.ep-skillc-col{padding:18px 22px}
.ep-skillc-col--trace{background:#F1F3F7;border-left:1px solid var(--line)}
.ep-skillc-collabel{display:flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;
  font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--slate);margin-bottom:11px}
.ep-skillc-collabel::before{content:"";width:18px;height:2px;background:var(--copper);display:inline-block;flex-shrink:0}
.ep-skillc-sit{margin:0;color:#33424B;font-size:14px}
.ep-trace-list{display:flex;flex-direction:column;gap:12px}
.ep-trace-item{font-size:14px;color:#33424B}
.ep-trace-text{color:#33424B}
.ep-skillc-comment{padding:16px 22px;border-top:1px solid var(--line);background:#FBFAF6}
.ep-comment-input{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font:inherit;
  font-size:14px;background:#fff;color:var(--ink);resize:vertical;min-height:48px}
.ep-comment-input:focus{outline:2px solid var(--copper);border-color:var(--copper)}
.ep-preuve-badge{display:inline-block;background:var(--navy);color:#fff;font-family:'JetBrains Mono',monospace;
  font-size:9.5px;letter-spacing:.1em;padding:3px 8px;border-radius:5px;margin-right:9px;vertical-align:middle}

/* --- Sous-onglets --- */
.ep-subtabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.ep-subtab{display:flex;flex-direction:column;gap:1px;align-items:flex-start;border:1px solid var(--line);
  background:#fff;border-radius:10px;padding:9px 16px;cursor:pointer;font:inherit;color:var(--slate);min-width:120px}
.ep-subtab--on{background:var(--navy);border-color:var(--navy);color:#fff}
.ep-subtab-label{font-family:'Archivo',sans-serif;font-weight:700;font-size:14px}
.ep-subtab-sub{font-size:11px;opacity:.8}
.ep-subtabs--sm .ep-subtab{padding:7px 14px;min-width:0}

/* --- Blocs de comp\xE9tences --- */
.ep-block{margin-bottom:22px}
.ep-block-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;
  border-bottom:2px solid var(--copper);padding-bottom:6px;margin-bottom:12px}
.ep-block-title{font-family:'Archivo',sans-serif;font-weight:700;font-size:16px;color:var(--navy)}
.ep-block-count{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--slate);white-space:nowrap}

/* --- Preuves sur comp\xE9tence --- */
.ep-proof-block{margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
.ep-proof-head{display:flex;align-items:center;justify-content:space-between;
  font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--slate)}
.ep-btn--xs{padding:4px 9px;font-size:12px}
.ep-proof-none{display:block;margin-top:8px;font-size:12.5px;color:var(--slate);font-style:italic}
.ep-proof-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.ep-proof-item{display:flex;flex-direction:column;gap:2px;background:#FCFBF8;border:1px solid var(--line);border-radius:8px;padding:8px 10px}
.ep-proof-type{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--copper)}
.ep-proof-link{display:inline-flex;align-items:center;gap:5px;color:var(--navy);font-size:13px;font-weight:600;
  text-decoration:none;background:none;border:0;padding:0;cursor:pointer;text-align:left;width:fit-content}
.ep-proof-link:hover{text-decoration:underline}
.ep-proof-comment{font-size:12.5px;color:#46565F;font-style:italic}
.ep-filechip{display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:#FCFBF8;
  border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12.5px;color:var(--navy)}

/* --- Responsive --- */
@media (max-width:880px){
  .ep-root{flex-direction:column}
  .ep-side{width:100%;height:auto;position:static;padding:14px 0 0}
  .ep-brand{padding:0 18px 12px}
  .ep-nav{flex-direction:row;overflow-x:auto;padding:8px 10px;gap:4px}
  .ep-navitem{flex-direction:column;gap:4px;padding:8px 12px;font-size:11.5px;white-space:nowrap}
  .ep-navnum,.ep-navchev{display:none}
  .ep-savestate{display:none}
  .ep-main{padding:22px 16px 56px}
  .ep-grid2{grid-template-columns:1fr}
  .ep-tl-item{grid-template-columns:1fr;gap:2px}
  .ep-projgrid{grid-template-columns:1fr}
  .ep-skillc-body{grid-template-columns:1fr}
  .ep-skillc-col--trace{border-left:0;border-top:1px solid var(--line)}
  .ep-skillc-head{flex-direction:column;align-items:flex-start;gap:10px}
  .ep-h1{font-size:26px}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
}
